# Build and Release workflow
# Triggers on version tags (v*) or manual dispatch

name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g., 1.0.0). Leave empty to extract from version.json'
        required: false
        type: string

permissions:
  actions: read
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      # Keep xmake/vcpkg caches in workspace for reliable cache restore on GitHub runners.
      XMAKE_GLOBALDIR: ${{ github.workspace }}\.xmake-global
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch third-party dependencies
        run: node scripts/fetch-third-party.js

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: |
            web/package-lock.json

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest

      - name: Patch xmake #7554
        run: node scripts/patch-xmake-7554.js

      - name: Cache xmake/vcpkg dependencies
        id: cache_xmake_vcpkg
        uses: actions/cache@v4
        with:
          path: |
            .xmake
            .xmake-global
            build/.packages/v
          key: ${{ runner.os }}-${{ runner.arch }}-xmake-vcpkg-${{ hashFiles('xmake.lua', 'xmake-requires.lock', 'scripts/patch-vcpkg.js') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-xmake-vcpkg-

      - name: Ensure cache directories exist
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ".xmake" | Out-Null
          New-Item -ItemType Directory -Force -Path ".xmake-global" | Out-Null
          New-Item -ItemType Directory -Force -Path "build/.packages/v" | Out-Null

      - name: Cache diagnostics (concise)
        shell: pwsh
        run: |
          Write-Host "xmake/vcpkg cache hit: ${{ steps.cache_xmake_vcpkg.outputs.cache-hit }}"
          Write-Host ".xmake -> $((Test-Path '.xmake') ? 'exists' : 'missing')"
          Write-Host ".xmake-global -> $((Test-Path '.xmake-global') ? 'exists' : 'missing')"
          Write-Host "build/.packages/v -> $((Test-Path 'build/.packages/v') ? 'exists' : 'missing')"

      - name: Setup .NET (for WiX)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX Toolset v6
        run: |
          dotnet tool install --global wix --version 6.0.2
          wix extension add WixToolset.UI.wixext/6.0.2 --global
          wix extension add WixToolset.Util.wixext/6.0.2 --global
          wix extension add WixToolset.BootstrapperApplications.wixext/6.0.2 --global

      - name: Resolve final version
        id: final_version
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if ([string]::IsNullOrEmpty($version)) {
            $versionJson = Get-Content "version.json" -Raw | ConvertFrom-Json
            $rawVersion = $versionJson.version
            if ([string]::IsNullOrWhiteSpace($rawVersion)) {
              Write-Error "Could not extract version from version.json"
              exit 1
            }
            # Convert 1.0.0.0 to 1.0.0 for MSI (max 3 parts)
            $versionParts = $rawVersion.Split('.')
            if ($versionParts.Count -lt 3) {
              Write-Error "version.json version must contain at least 3 parts: $rawVersion"
              exit 1
            }
            $version = "$($versionParts[0]).$($versionParts[1]).$($versionParts[2])"
          }
          Write-Host "Final version: $version"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Validate SignPath configuration
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          SIGNPATH_ARTIFACT_CONFIG_APP_EXE: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_APP_EXE }}
          SIGNPATH_ARTIFACT_CONFIG_MSI: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_MSI }}
          SIGNPATH_ARTIFACT_CONFIG_SETUP_EXE: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_SETUP_EXE }}
        run: |
          $required = @(
            "SIGNPATH_API_TOKEN",
            "SIGNPATH_ORGANIZATION_ID",
            "SIGNPATH_PROJECT_SLUG",
            "SIGNPATH_SIGNING_POLICY_SLUG",
            "SIGNPATH_ARTIFACT_CONFIG_APP_EXE",
            "SIGNPATH_ARTIFACT_CONFIG_MSI",
            "SIGNPATH_ARTIFACT_CONFIG_SETUP_EXE"
          )

          $missing = @()
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "env:$name").Value)) {
              $missing += $name
            }
          }

          if ($missing.Count -gt 0) {
            Write-Error ("Missing SignPath GitHub secret/variable(s): " + ($missing -join ", "))
            exit 1
          }

      - name: Install dependencies
        run: |
          npm install
          npm ci --prefix web

      - name: Update preinstalled vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = if ($env:VCPKG_INSTALLATION_ROOT) { $env:VCPKG_INSTALLATION_ROOT } else { 'C:\vcpkg' }
          git -C $vcpkgRoot pull --ff-only

      - name: Prepare xmake release dependencies
        run: xmake f -m release -y

      - name: Patch vcpkg private cache
        run: npm run patch:vcpkg

      - name: Build C++ backend (Release)
        run: xmake build -y

      - name: Build Web frontend
        run: npm run build:web

      - name: Assemble dist
        run: npm run build:dist

      - name: Upload unsigned app executable
        id: upload_unsigned_app_exe
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-app-exe-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/SpinningMomo.exe
          if-no-files-found: error

      - name: Sign app executable
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_APP_EXE }}
          github-artifact-id: ${{ steps.upload_unsigned_app_exe.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signpath-output/app-exe

      - name: Replace dist executable with signed executable
        shell: pwsh
        run: |
          Copy-Item "signpath-output/app-exe/SpinningMomo.exe" "dist/SpinningMomo.exe" -Force

      - name: Create Portable ZIP
        run: npm run build:portable

      - name: Build MSI package
        run: node scripts/build-installer.js --msi-only --version "${{ steps.final_version.outputs.VERSION }}"

      - name: Upload unsigned MSI
        id: upload_unsigned_msi
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-msi-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/SpinningMomo-${{ steps.final_version.outputs.VERSION }}-x64.msi
          if-no-files-found: error

      - name: Sign MSI
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_MSI }}
          github-artifact-id: ${{ steps.upload_unsigned_msi.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signpath-output/msi
          parameters: |
            version: "${{ steps.final_version.outputs.VERSION }}"

      - name: Replace dist MSI with signed MSI
        shell: pwsh
        run: |
          $version = "${{ steps.final_version.outputs.VERSION }}"
          Copy-Item "signpath-output/msi/SpinningMomo-$version-x64.msi" "dist/SpinningMomo-$version-x64.msi" -Force

      - name: Build setup bundle
        run: node scripts/build-installer.js --bundle-only --version "${{ steps.final_version.outputs.VERSION }}"

      - name: Upload unsigned setup executable
        id: upload_unsigned_setup_exe
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-setup-exe-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/SpinningMomo-${{ steps.final_version.outputs.VERSION }}-x64-Setup.exe
          if-no-files-found: error

      - name: Sign setup executable
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ vars.SIGNPATH_ARTIFACT_CONFIG_SETUP_EXE }}
          github-artifact-id: ${{ steps.upload_unsigned_setup_exe.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signpath-output/setup-exe
          parameters: |
            version: "${{ steps.final_version.outputs.VERSION }}"

      - name: Replace dist setup executable with signed executable
        shell: pwsh
        run: |
          $version = "${{ steps.final_version.outputs.VERSION }}"
          Copy-Item "signpath-output/setup-exe/SpinningMomo-$version-x64-Setup.exe" "dist/SpinningMomo-$version-x64-Setup.exe" -Force

      - name: Generate checksums
        run: npm run build:checksums

      - name: Upload artifacts (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: SpinningMomo-All
          path: |
            dist/*-Setup.exe
            dist/*-Portable.zip
            dist/SHA256SUMS.txt
            build/windows/x64/release/SpinningMomo.pdb
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*-Setup.exe
            dist/*-Portable.zip
            dist/SHA256SUMS.txt
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release files to Cloudflare R2
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_ENDPOINT_URL: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          $version = "${{ steps.final_version.outputs.VERSION }}"
          $bucket = "${{ secrets.R2_BUCKET_NAME }}"
          $dest = "s3://$bucket/releases/v$version"
          
          aws s3 cp "dist/SpinningMomo-$version-x64-Portable.zip" "$dest/SpinningMomo-$version-x64-Portable.zip"
          aws s3 cp "dist/SpinningMomo-$version-x64-Setup.exe" "$dest/SpinningMomo-$version-x64-Setup.exe"
          aws s3 cp "dist/SHA256SUMS.txt" "$dest/SHA256SUMS.txt"
          Write-Host "Uploaded release files to R2: $dest"

      - name: Trigger CNB api_trigger_release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CNB_TOKEN)) {
            Write-Error "Missing secret: CNB_TOKEN"
            exit 1
          }

          $releaseTag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($releaseTag)) {
            Write-Error "Empty release tag from github.ref_name"
            exit 1
          }

          $headers = @{
            Authorization = "Bearer $($env:CNB_TOKEN)"
            "Content-Type" = "application/json"
          }

          $payload = @{
            event = "api_trigger_release"
            branch = "main"
            env = @{
              RELEASE_TAG = $releaseTag
            }
          } | ConvertTo-Json -Depth 8

          $uri = "https://api.cnb.cool/infinitymomo/SpinningMomo/-/build/start"
          Write-Host "Triggering CNB api_trigger_release for tag: $releaseTag"
          Invoke-RestMethod -Method Post -Uri $uri -Headers $headers -Body $payload | Out-Null
          Write-Host "CNB trigger request sent."
